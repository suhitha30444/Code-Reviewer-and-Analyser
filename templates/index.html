<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Code Reviewer</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg:        #111318;
      --surface:   #181c24;
      --border:    #232837;
      --muted:     #3d4559;
      --subtle:    #64748b;
      --body:      #c8d0e0;
      --heading:   #eef1f7;
      --accent:    #5b7fff;
      --accent-dim:#1e2a4a;
    }

    body {
      background: var(--bg);
      color: var(--body);
      font-family: 'IBM Plex Sans', sans-serif;
      font-weight: 300;
      min-height: 100vh;
      padding: 3rem 1.5rem;
    }

    /* ── Header ── */
    header {
      max-width: 760px;
      margin: 0 auto 3rem;
      display: flex;
      align-items: baseline;
      gap: 1rem;
      border-bottom: 1px solid var(--border);
      padding-bottom: 1.25rem;
    }

    header h1 {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 1.1rem;
      font-weight: 500;
      color: var(--heading);
      letter-spacing: -0.01em;
    }

    header span {
      font-size: 0.78rem;
      color: var(--subtle);
      letter-spacing: 0.04em;
    }

    /* ── Main layout ── */
    .wrap {
      max-width: 760px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
    }

    /* ── Row: language selector ── */
    .row-lang {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .row-lang label {
      font-size: 0.75rem;
      color: var(--subtle);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      white-space: nowrap;
    }

    select {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--body);
      padding: 0.4rem 0.75rem;
      border-radius: 4px;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.82rem;
      cursor: pointer;
      outline: none;
      transition: border-color 0.15s;
    }

    select:focus { border-color: var(--accent); }

    /* ── Code input panel ── */
    .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      overflow: hidden;
    }

    .panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.6rem 1rem;
      border-bottom: 1px solid var(--border);
      background: var(--bg);
    }

    .panel-header span {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.72rem;
      color: var(--muted);
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    /* three dots — signature element */
    .dots {
      display: flex;
      gap: 5px;
    }

    .dots i {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: var(--border);
      display: block;
    }

    textarea {
      width: 100%;
      height: 240px;
      background: var(--surface);
      border: none;
      color: var(--heading);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.83rem;
      line-height: 1.75;
      padding: 1rem 1.25rem;
      resize: vertical;
      outline: none;
    }

    textarea::placeholder { color: var(--muted); }

    /* ── Action row ── */
    .action-row {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    button {
      background: var(--accent);
      color: #fff;
      border: none;
      padding: 0.55rem 1.4rem;
      font-family: 'IBM Plex Sans', sans-serif;
      font-weight: 500;
      font-size: 0.85rem;
      border-radius: 4px;
      cursor: pointer;
      transition: opacity 0.15s;
      letter-spacing: 0.01em;
    }

    button:hover { opacity: 0.85; }
    button:disabled { opacity: 0.35; cursor: not-allowed; }

    #status {
      font-size: 0.78rem;
      color: var(--subtle);
      font-family: 'IBM Plex Mono', monospace;
    }

    /* ── Output panel ── */
    .output-panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      overflow: hidden;
      display: none;
    }

    .output-panel.visible { display: block; }

    .output-panel .panel-header {
      border-bottom: 1px solid var(--border);
    }

    /* accent line on output header */
    .output-panel .panel-header::before {
      content: '';
      display: block;
      width: 2px;
      height: 14px;
      background: var(--accent);
      border-radius: 1px;
      margin-right: 0.6rem;
    }

    #output {
      white-space: pre-wrap;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.81rem;
      line-height: 1.8;
      color: var(--body);
      padding: 1.25rem;
    }

    /* ── Footer ── */
    footer {
      max-width: 760px;
      margin: 3rem auto 0;
      font-size: 0.72rem;
      color: var(--muted);
      letter-spacing: 0.03em;
    }
  </style>
</head>
<body>

  <header>
    <h1>code reviewer</h1>
    <span>powered by llama 3.1</span>
  </header>

  <div class="wrap">

    <div class="row-lang">
      <label>Language</label>
      <select id="language">
        <option value="python">python</option>
        <option value="java">java</option>
        <option value="c">c</option>
        <option value="javascript">javascript</option>
      </select>
    </div>

    <div class="panel">
      <div class="panel-header">
        <span>input</span>
        <div class="dots"><i></i><i></i><i></i></div>
      </div>
      <textarea id="code" placeholder="paste your code here..."></textarea>
    </div>

    <div class="action-row">
      <button id="reviewBtn" onclick="reviewCode()">Review</button>
      <span id="status"></span>
    </div>

    <div class="output-panel" id="outputPanel">
      <div class="panel-header">
        <span>analysis</span>
        <div class="dots"><i></i><i></i><i></i></div>
      </div>
      <div id="output"></div>
    </div>

  </div>

  <footer>smart code reviewer &nbsp;·&nbsp; flask + groq</footer>

  <script>
    async function reviewCode() {
      const code = document.getElementById("code").value.trim();
      const language = document.getElementById("language").value;
      const output = document.getElementById("output");
      const outputPanel = document.getElementById("outputPanel");
      const btn = document.getElementById("reviewBtn");
      const status = document.getElementById("status");

      if (!code) {
        status.textContent = "paste some code first.";
        return;
      }

      btn.disabled = true;
      status.textContent = "analyzing...";
      outputPanel.classList.remove("visible");

      const res = await fetch("/review", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ code, language })
      });

      const data = await res.json();
      output.textContent = data.feedback || data.error;
      outputPanel.classList.add("visible");
      status.textContent = "";
      btn.disabled = false;
    }
  </script>

</body>
</html>
